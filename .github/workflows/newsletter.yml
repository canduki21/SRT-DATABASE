name: Weekly Newsletter Draft

on:
  schedule:
    - cron: '0 7 * * 5'   # every Friday at 7am UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate newsletter draft
        run: python scripts/generate_newsletter.py

      - name: Commit newsletter draft
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletters/
          git diff --cached --quiet || git commit -m "chore: add weekly newsletter draft [skip ci]"
          git push

name: Fetch New Papers

on:
  schedule:
    - cron: '0 8 * * 1'   # every Monday at 8am UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch new papers from Semantic Scholar
        id: fetch
        run: |
          python scripts/fetch_new_papers.py >> $GITHUB_OUTPUT 2>&1

      - name: Rebuild site
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run build

      - name: Commit updated papers.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/papers.json dist/
          git diff --cached --quiet || git commit -m "chore: auto-fetch papers — +${{ steps.fetch.outputs.new }} new [skip ci]"
          git push

      - name: Write job summary
        run: |
          echo "## Paper Fetch Results" >> $GITHUB_STEP_SUMMARY
          echo "- **New papers added:** ${{ steps.fetch.outputs.new }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total papers:** ${{ steps.fetch.outputs.total }}" >> $GITHUB_STEP_SUMMARY

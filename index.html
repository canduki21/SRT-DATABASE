<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Research paper database for Space Resource Technologies simulants — LHS-1, LMS-1, MGS-1, and more." />
    <title>SRT Research Database</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      function reportHeight() {
        window.parent.postMessage({ type: 'srt-resize', height: document.documentElement.scrollHeight }, '*');
      }
      new MutationObserver(reportHeight).observe(document.body, { childList: true, subtree: true });
      new ResizeObserver(reportHeight).observe(document.documentElement);
      window.addEventListener('load', reportHeight);
    </script>
  </body>
</html>
